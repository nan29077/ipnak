<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 하늘: 따뜻한 노을(크림/피치 → 살구 → 옅은 청록) -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fdf3e3"/>
      <stop offset="32%" stop-color="#fde6c8"/>
      <stop offset="55%" stop-color="#ffd9a8"/>
      <stop offset="72%" stop-color="#f7c79a"/>
      <stop offset="100%" stop-color="#e9c79e"/>
    </linearGradient>
    <!-- 바다: 밝은 청록 → 차분한 틸 -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#bfe0db"/>
      <stop offset="40%" stop-color="#9fcdc8"/>
      <stop offset="100%" stop-color="#7fb4b0"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff3da" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd089" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd089" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sunCol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff0cf" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff0cf" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 하늘 -->
  <rect x="0" y="0" width="1600" height="760" fill="url(#sky)"/>
  <!-- 태양 글로우 + 해 -->
  <circle cx="1050" cy="470" r="430" fill="url(#sunGlow)"/>
  <circle cx="1050" cy="470" r="116" fill="#fff1d2"/>
  <circle cx="1050" cy="470" r="116" fill="none" stroke="#ffe2ad" stroke-width="10" opacity="0.6"/>

  <!-- 옅은 구름 -->
  <g fill="#fffaf0" opacity="0.55">
    <ellipse cx="320" cy="210" rx="170" ry="34"/>
    <ellipse cx="470" cy="245" rx="120" ry="26"/>
    <ellipse cx="1240" cy="170" rx="150" ry="30"/>
  </g>

  <!-- 새 -->
  <g stroke="#8a6a4a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M250 360 q22 -20 44 0 q22 -20 44 0"/>
    <path d="M360 410 q16 -15 32 0 q16 -15 32 0"/>
    <path d="M1320 320 q18 -16 36 0 q18 -16 36 0"/>
  </g>

  <!-- 바다 -->
  <rect x="0" y="755" width="1600" height="445" fill="url(#sea)"/>
  <!-- 해가 비친 빛 기둥 -->
  <rect x="980" y="755" width="140" height="445" fill="url(#sunCol)"/>

  <!-- 수면 반사 물결 밴드 -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M40 820 q60 -12 120 0 t120 0" stroke-width="4"/>
    <path d="M900 800 q60 -12 120 0 t120 0" stroke-width="4"/>
    <path d="M380 880 q70 -14 140 0 t140 0" stroke-width="5"/>
    <path d="M1080 905 q70 -14 140 0 t140 0" stroke-width="5"/>
    <path d="M120 980 q80 -16 160 0 t160 0" stroke-width="6"/>
    <path d="M880 1010 q80 -16 160 0 t160 0" stroke-width="6"/>
    <path d="M300 1090 q90 -18 180 0 t180 0" stroke-width="6"/>
  </g>
  <g stroke="#5f9a96" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M200 850 q60 12 120 0 t120 0" stroke-width="3"/>
    <path d="M1000 940 q70 14 140 0 t140 0" stroke-width="3"/>
    <path d="M120 1040 q80 16 160 0 t160 0" stroke-width="4"/>
  </g>

  <!-- 낚싯배 + 낚시꾼 (실루엣) -->
  <g transform="translate(430 720)">
    <!-- 배 그림자 -->
    <ellipse cx="60" cy="120" rx="180" ry="18" fill="#3d5a57" opacity="0.35"/>
    <!-- 선체 -->
    <path d="M-110 78 q170 60 340 0 l-34 50 q-136 34 -272 0 Z" fill="#5c4632"/>
    <path d="M-110 78 q170 60 340 0 l-8 12 q-164 52 -324 0 Z" fill="#6e553d"/>
    <!-- 낚시꾼 -->
    <g fill="#3a4a47">
      <circle cx="70" cy="-2" r="20"/>
      <path d="M52 18 q18 -10 36 0 l8 56 q-26 12 -52 0 Z"/>
    </g>
    <!-- 낚싯대 + 줄 -->
    <path d="M86 20 L250 -120" stroke="#2f3d3a" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M250 -120 L268 120" stroke="#2f3d3a" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- 뛰어오르는 물고기 -->
  <g transform="translate(1180 980)" fill="none" stroke="#3a5a56" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M0 0 q40 -34 86 0 q-40 34 -86 0 Z"/>
    <path d="M86 0 l26 -18 v36 Z"/>
    <circle cx="22" cy="-3" r="3.4" fill="#3a5a56" stroke="none"/>
  </g>
  <!-- 작은 물고기 -->
  <g transform="translate(250 1040) scale(0.7)" fill="none" stroke="#3a5a56" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <path d="M0 0 q40 -30 80 0 q-40 30 -80 0 Z"/>
    <path d="M80 0 l22 -16 v32 Z"/>
  </g>
</svg>
